name: Test Project

on:
  pull_request:
    types:
      - opened
    branches:
      - main
      - "dev-*"
      - "feat/**"

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Output Github contedt
        run: echo "${{ toJSON(github) }}"
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy
        run: echo "Deploying..."
